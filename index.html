<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>视频修改意见生成器</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>视频修改意见生成器</h1>
          <p>录入时间轴和修改意见，一键生成 JPG 长图。</p>
          <div class="highlight-note">今天你给 Judy 投票了吗</div>
        </div>
        <div class="top-actions">
          <button class="button ghost" id="clearAllButton" type="button">清空</button>
          <button class="button ghost" id="exportProjectButton" type="button">导出意见</button>
          <label class="button ghost import-project-button" for="importProjectInput">导入意见</label>
          <input id="importProjectInput" type="file" accept=".json,application/json" />
          <button class="button primary" id="downloadJpgButton" type="button">生成 JPG</button>
          <button class="button secondary" id="downloadPdfButton" type="button">生成 PDF</button>
        </div>
      </header>

      <section class="workspace" id="workspace">
        <section class="video-locator" id="videoLocator">
          <div class="section-title">原片定位</div>
          <div class="file-picker">
            <label class="file-button" for="videoInput">上传原片</label>
            <span id="videoFileName">未选择视频</span>
            <input id="videoInput" type="file" accept="video/*" />
          </div>
          <div class="video-tools" id="videoTools" hidden>
            <video id="sourceVideo" controls playsinline></video>
            <div class="video-meta">
              <span>当前时间：<strong id="currentVideoTime">00:00:00:00</strong></span>
              <button class="button secondary" id="captureFrameButton" type="button">带入当前画面和时间轴</button>
            </div>
            <small>拖动视频到需要修改的位置，点击按钮后会自动填入时间轴，并把当前画面作为参考图。</small>
          </div>
        </section>

        <form class="editor-panel" id="entryForm">
          <label class="field">
            <span>时间轴</span>
              <input id="timeInput" autocomplete="off" placeholder="如 0123、01:23、0138-0200" />
              <small>不填时间轴时，会默认识别为“全片”。</small>
              <small>需要补充上一条意见时，先点击“补充上一条”，系统会自动带入上一条时间轴，再填写新的修改意见。</small>
            </label>

          <label class="field note-field">
            <div class="note-heading">
              <span>修改意见</span>
              <div class="note-heading-actions">
                <div class="status-toast" id="statusToast" role="status" aria-live="polite" hidden></div>
                <button class="button ghost" id="copyLastTimeButton" type="button">补充上一条</button>
                <button class="button primary" id="submitButton" type="submit">添加一条</button>
              </div>
            </div>
            <textarea id="noteInput" rows="8" placeholder="直接输入修改意见。多行内容会保留换行。"></textarea>
          </label>

          <label class="field">
            <span>类型</span>
            <select id="typeInput">
              <option value="自动识别">自动识别</option>
              <option value="删除">删除</option>
              <option value="花字 / 包装">花字 / 包装</option>
              <option value="字幕">字幕</option>
              <option value="素材">素材</option>
              <option value="美颜">美颜</option>
              <option value="画面剪辑">画面剪辑</option>
              <option value="结构">结构</option>
              <option value="修改">修改</option>
            </select>
          </label>

          <label class="field">
            <span>参考图</span>
            <div class="file-picker">
              <label class="file-button" for="referenceImageInput">上传参考图</label>
              <span id="referenceFileName">未选择图片</span>
              <input id="referenceImageInput" type="file" accept="image/*" />
            </div>
          </label>
          <div class="reference-preview" id="referencePreview" hidden>
            <img id="referencePreviewImage" alt="参考图预览" />
            <button class="button ghost" id="removeReferenceButton" type="button">删除参考图</button>
          </div>

          <div class="form-actions">
            <button class="button ghost" id="cancelEditButton" type="button" hidden>取消编辑</button>
          </div>
        </form>

        <section class="list-panel" aria-label="已添加修改意见">
          <div class="panel-heading">
            <h2>已添加</h2>
            <span id="countLabel">0 条</span>
          </div>
          <div class="entry-list" id="entryList"></div>
        </section>

        <section class="preview-panel" aria-label="长图预览">
          <div class="panel-heading">
            <h2>JPG 预览</h2>
            <span>自动按时间排序</span>
          </div>
          <div class="image-preview" id="imagePreview"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
