<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>视频修改意见生成器</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-logo" aria-hidden="true">▶</div>
          <div class="brand-copy">
            <h1>视频修改意见生成器</h1>
            <p>录入时间轴和修改意见，一键导出给剪辑看。</p>
          </div>
          <div class="highlight-note">今天你给 Judy 投票了吗</div>
        </div>
        <div class="top-actions">
          <button class="button primary" id="downloadPdfButton" type="button">导出给剪辑看</button>
        </div>
      </header>

      <section class="workspace" id="workspace">
        <section class="video-locator" id="videoLocator">
          <div class="video-stage video-dropzone" id="videoDropzone">
            <input id="videoInput" type="file" accept="video/*" />
            <div class="video-empty" id="videoEmptyState">
              <label class="video-empty-button" for="videoInput">导入视频</label>
              <div class="video-empty-text">支持拖拽视频到这里</div>
            </div>
            <div class="video-display" id="videoDisplay" hidden>
              <video id="sourceVideo" playsinline></video>
            </div>
          </div>
          <div class="video-tools">
            <div class="player-strip">
              <button class="play-toggle" id="playToggleButton" type="button" aria-label="播放" data-playing="false"></button>
              <span class="strip-time" id="stripCurrentTime">00:00</span>
              <input id="videoScrubber" class="video-scrubber" type="range" min="0" max="1000" value="0" step="1" aria-label="视频进度条" />
              <span class="strip-time" id="stripDuration">00:00</span>
              <button class="speed-toggle" id="speedToggleButton" type="button">1x</button>
            </div>
            <div class="precise-controls">
              <div class="precise-head">
                <span>精确定位</span>
              <div class="jump-time">
                <input id="jumpTimeInput" autocomplete="off" placeholder="如 0123、01:23" />
                <button class="button ghost" id="jumpTimeButton" type="button">跳转</button>
              </div>
            </div>
              <div class="nudge-actions">
                <button class="button ghost" type="button" data-nudge="-5">-5秒</button>
                <button class="button ghost" type="button" data-nudge="-1">-1秒</button>
                <button class="button ghost" type="button" data-nudge="1">+1秒</button>
                <button class="button ghost" type="button" data-nudge="5">+5秒</button>
              </div>
            </div>
            <div class="range-selector">
              <div class="range-head">
                <span>修改一整段时间</span>
                <strong id="selectedRangeLabel">还没选这一段</strong>
              </div>
              <p class="range-help">如果这条意见不是某一秒，而是一整段视频，就用这里选时间段。</p>
              <div class="range-status">
                <span>
                  <button class="range-time" id="rangeStartJumpButton" type="button">开始：<b id="rangeStartText">未选择</b></button>
                  <button class="range-clear" id="clearRangeStartButton" type="button" aria-label="删除开始时间">删除</button>
                </span>
                <span>
                  <button class="range-time" id="rangeEndJumpButton" type="button">结束：<b id="rangeEndText">未选择</b></button>
                  <button class="range-clear" id="clearRangeEndButton" type="button" aria-label="删除结束时间">删除</button>
                </span>
              </div>
              <div class="range-actions">
                <button class="button ghost" id="setRangeStartButton" type="button">这段从这里开始</button>
                <button class="button ghost" id="setRangeEndButton" type="button">这段到这里结束</button>
                <button class="button secondary" id="applyRangeButton" type="button">填入这段时间</button>
              </div>
            </div>
            <div class="video-meta">
              <span>当前时间：<strong id="currentVideoTime">00:00</strong></span>
            </div>
            <small>拖动视频到需要修改的位置，时间轴会自动填入“录入意见”里。如需参考图，可在下方手动上传。</small>
          </div>
        </section>

        <form class="editor-panel" id="entryForm">
          <div class="section-title-row">
            <div class="section-title">录入意见</div>
            <div class="section-tools">
              <label class="button ghost import-project-button" for="importProjectInput">
                <span class="button-icon" aria-hidden="true">↓</span>
                <span>导入意见</span>
              </label>
              <input id="importProjectInput" type="file" accept=".json,application/json" />
              <button class="button ghost" id="exportProjectButton" type="button">
                <span class="button-icon" aria-hidden="true">↑</span>
                <span>导出意见</span>
              </button>
            </div>
          </div>
          <label class="field">
            <span>时间轴</span>
              <input id="timeInput" autocomplete="off" placeholder="如 0123、01:23、0138-0200" />
              <small>不填时间轴时，会默认识别为“全片”。</small>
            </label>

          <label class="field note-field">
            <div class="note-heading">
              <span>修改意见</span>
              <div class="note-heading-actions">
                <div class="status-toast" id="statusToast" role="status" aria-live="polite" hidden></div>
                <button class="button primary" id="submitButton" type="submit">添加一条</button>
              </div>
            </div>
            <textarea id="noteInput" rows="8" placeholder="直接输入修改意见。多行内容会保留换行。"></textarea>
          </label>

          <label class="field">
            <span>类型</span>
            <select id="typeInput">
              <option value="自动识别">自动识别</option>
              <option value="删除">删除</option>
              <option value="花字 / 包装">花字 / 包装</option>
              <option value="字幕">字幕</option>
              <option value="素材">素材</option>
              <option value="美颜">美颜</option>
              <option value="画面剪辑">画面剪辑</option>
              <option value="结构">结构</option>
              <option value="修改">修改</option>
            </select>
          </label>

          <label class="field">
            <span>参考图</span>
            <div class="file-picker">
              <label class="file-button" for="referenceImageInput">上传参考图</label>
              <span id="referenceFileName">未选择图片</span>
              <input id="referenceImageInput" type="file" accept="image/*" />
            </div>
          </label>
          <div class="reference-preview" id="referencePreview" hidden>
            <img id="referencePreviewImage" alt="参考图预览" />
            <button class="button ghost" id="removeReferenceButton" type="button">删除参考图</button>
          </div>

          <div class="form-actions">
            <button class="button ghost" id="cancelEditButton" type="button" hidden>取消编辑</button>
          </div>
        </form>

        <section class="list-panel" aria-label="已添加修改意见">
          <div class="panel-heading">
            <h2>已添加</h2>
            <div class="panel-heading-actions">
              <span id="countLabel">0 条</span>
              <button class="button ghost" id="clearAllButton" type="button">清空</button>
            </div>
          </div>
          <div class="entry-list" id="entryList"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
